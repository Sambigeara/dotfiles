# Startup
after-login-command = []
after-startup-command = [
  'exec-and-forget /opt/homebrew/bin/borders active_color=0xffcba6f7 inactive_color=0xff313244 width=4.0 style=round corner_radius=6.0 ax_focus=on'
]
exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE AEROSPACE_PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]
start-at-login = true

# Normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout defaults
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Don't auto-unhide macOS hidden apps
automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

# Gaps — reserve space for SketchyBar (28px bar height).
[gaps]
inner.horizontal = 2
inner.vertical   = 2
outer.left       = 2
outer.bottom     = 2
outer.top        = [{ monitor.main = 0 }, 30]
outer.right      = 2

# ---------------------------------------------------------------
# Main bindings
# ---------------------------------------------------------------
[mode.main.binding]

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-z     = 'fullscreen'

# Focus (cross-monitor)
alt-h = 'focus left --boundaries all-monitors-outer-frame --boundaries-action stop'
alt-j = 'focus down --boundaries all-monitors-outer-frame --boundaries-action stop'
alt-k = 'focus up --boundaries all-monitors-outer-frame --boundaries-action stop'
alt-l = 'focus right --boundaries all-monitors-outer-frame --boundaries-action stop'

# Move window (within workspace, then cross-monitor fallback)
alt-shift-h = ['move left', 'move-node-to-monitor --focus-follows-window left']
alt-shift-j = ['move down', 'move-node-to-monitor --focus-follows-window down']
alt-shift-k = ['move up', 'move-node-to-monitor --focus-follows-window up']
alt-shift-l = ['move right', 'move-node-to-monitor --focus-follows-window right']

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Workspace switching
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Service mode
alt-shift-semicolon = 'mode service'

# ---------------------------------------------------------------
# Service mode
# ---------------------------------------------------------------
[mode.service.binding]
esc       = ['reload-config', 'mode main']
r         = ['flatten-workspace-tree', 'mode main']
f         = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

down       = 'volume down'
up         = 'volume up'
shift-down = ['volume set 0', 'mode main']

