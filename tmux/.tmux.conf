# Enable mouse click focusing
set -g mouse on

# Create new panes in the same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

bind-key -r "C-c" new-window -c "#{pane_current_path}" "fp"
bind-key -r "T" run-shell "fish -c 'change_background &'"

# Non-leader mappings
bind-key -n C-z resize-pane -Z

# Pane borders
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour35,bold'
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{pane_current_command} '

# Status bar — neutral, adapts to light/dark
set -g status on
set -g status-position bottom
set -g status-style 'bg=default fg=colour248'
set -g status-left '#[bold] #S #[default] '
set -g status-right '%H:%M '
set -g status-left-length 30
set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[bold,fg=white] #I:#W '
set -g message-style 'bg=default fg=colour248'

# Set default shell
set-option -g default-shell /opt/homebrew/bin/fish

# RGB/true colours:
set-option -a terminal-features 'tmux-256color:RGB'

# Vi navigation for copy-mode (`Ctrl-b [`):
set-window-option -g mode-keys vi

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Minimally required for Claude Code `osascript` hook for notifications
set -g allow-passthrough on
